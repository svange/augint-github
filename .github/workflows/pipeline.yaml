name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

  security-scan:
    name: Security scanning
    runs-on: ubuntu-latest
    needs: [pre-commit]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Bandit security scan
        run: |
          uv run bandit -r src/ -f json -o bandit-report.json || true
          uv run bandit -r src/ -ll
        continue-on-error: false

      - name: Run pip-audit
        run: |
          uv export --no-dev --no-hashes -o prod-requirements.txt
          uv run pip-audit --desc --format json --output pip-audit-report.json \
            -r prod-requirements.txt --no-deps
        continue-on-error: false

      - name: Run Semgrep SAST scan
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/python
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: "1"
        continue-on-error: false

      - name: Generate security HTML report
        if: always()
        run: |
          cat > security-reports.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Security Scan Results</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 20px; background: #0d1117; color: #c9d1d9; }
                  .report { margin: 20px 0; padding: 15px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; }
                  .report h2 { color: #58a6ff; margin-top: 0; }
                  pre { background: #0d1117; padding: 10px; border-radius: 4px; overflow-x: auto; border: 1px solid #30363d; font-size: 12px; }
                  .error { color: #ff7b72; }
                  .warning { color: #ffa657; }
                  .info { color: #79c0ff; }
              </style>
          </head>
          <body>
              <h1>Security Scan Results</h1>
              <div class="report">
                  <h2>Bandit Security Scan</h2>
                  <pre id="bandit-content"></pre>
              </div>
              <div class="report">
                  <h2>Pip-Audit Results</h2>
                  <pre id="audit-content"></pre>
              </div>
              <div class="report">
                  <h2>Semgrep SAST Results</h2>
                  <pre id="semgrep-content"></pre>
              </div>
              <script>
                  const reports = [
                      {id: 'bandit-content', file: 'bandit-report.json'},
                      {id: 'audit-content', file: 'pip-audit-report.json'},
                      {id: 'semgrep-content', file: 'semgrep-results.sarif'}
                  ];
                  reports.forEach(report => {
                      fetch(report.file)
                          .then(response => response.json())
                          .then(data => {
                              document.getElementById(report.id).textContent = JSON.stringify(data, null, 2);
                          })
                          .catch(error => {
                              document.getElementById(report.id).textContent = 'Report not available';
                          });
                  });
              </script>
          </body>
          </html>
          EOF

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-scan-results
          path: |
            bandit-report.json
            pip-audit-report.json
            semgrep-results.sarif
            security-reports.html

  compliance-reports:
    name: License compliance
    runs-on: ubuntu-latest
    needs: [pre-commit]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate license reports
        run: |
          uv export --no-hashes --no-dev > runtime-requirements.txt
          uv run pip-licenses --from=mixed --format=json --output-file=license-report.json
          uv run pip-licenses --from=mixed --format=html --output-file=license-report.html
          uv run pip-licenses --from=mixed --summary

      - name: Upload compliance reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: compliance-reports
          path: |
            license-report.json
            license-report.html

  unit-tests:
    name: Unit tests
    needs: [pre-commit]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: |
          uv run pytest \
            --cov=src --cov-report=html --cov-report=xml --cov-fail-under=50 \
            --html=test-report.html --self-contained-html \
            --css=ci-resources/pytest-html.css \
            -v

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: unit-test-reports
          path: test-report.html

  release:
    name: Semantic release
    needs: [unit-tests, security-scan, compliance-reports]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Force release branch to workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Set up SSH agent for deploy key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git remote for SSH push
        run: git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run semantic release
        id: release
        run: |
          RELEASED="false"
          VERSION=""

          set +e
          uv run semantic-release --strict version
          SEMANTIC_EXIT_CODE=$?
          set -e

          if [ $SEMANTIC_EXIT_CODE -eq 0 ]; then
            echo "Semantic release succeeded"
            RELEASED="true"
            VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          else
            echo "No release needed"
          fi

          echo "released=$RELEASED" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload distribution artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: distribution-artifacts
          path: dist/
          if-no-files-found: warn

  publish-to-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.release.outputs.released == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/augint-github
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distribution-artifacts
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  docs:
    name: Deploy documentation
    needs: release
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate documentation
        run: |
          mkdir -p docs
          uv run pdoc --output-dir docs \
            --template-directory ci-resources/pdoc-templates \
            src/gh_secrets_and_vars_async || true

      - name: Download coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-reports
          path: docs/coverage
        continue-on-error: true

      - name: Download security scan results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: security-scan-results
          path: docs/security
        continue-on-error: true

      - name: Download compliance reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compliance-reports
          path: docs/compliance
        continue-on-error: true

      - name: Download unit test report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit-test-reports
          path: docs/tests
        continue-on-error: true

      - name: Prepare report index files
        run: |
          if [ -d docs/coverage/htmlcov ]; then
            cp -r docs/coverage/htmlcov/* docs/coverage/
          fi
          if [ -f docs/security/security-reports.html ]; then
            cp docs/security/security-reports.html docs/security/index.html
          fi
          if [ -f docs/compliance/license-report.html ]; then
            cp docs/compliance/license-report.html docs/compliance/index.html
          fi
          if [ -f docs/tests/test-report.html ]; then
            cp docs/tests/test-report.html docs/tests/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          publish_dir: ./docs
          publish_branch: gh-pages
